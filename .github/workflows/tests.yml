name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus_test?schema=public
      NEXTAUTH_SECRET: test-nextauth-secret
      PAYSTACK_SECRET_KEY: sk_test_ci
      NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: pk_test_ci
      TEST_BASE_URL: http://127.0.0.1:3000
      TEST_PREFIX: nexus-ci
      E2E_ADMIN_EMAIL: nexus-ci-admin@example.test
      E2E_ADMIN_PASSWORD: AdminPass123!
      SEED_ADMIN_EMAIL: nexus-ci-admin@example.test
      SEED_ADMIN_PASSWORD: AdminPass123!
      SITE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply migrations
        run: pnpm prisma:migrate:deploy

      - name: Seed admin user
        run: pnpm seed

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run unit/integration tests
        run: pnpm test:unit

      - name: Run E2E tests
        run: pnpm test:e2e
